name: Auto Merge Codex PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'codex/')
    steps:
      - name: Enable auto merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

## Step 4: Remove branch protection blocking auto-merge
1. Go to **Settings → Rules → Rulesets**
2. Edit your `main` branch ruleset
3. Make sure **required approvals is set to 0**
4. ✅ Keep **"Allow auto-merge"** enabled

---

## Step 5: Connect your repo to a hosting platform
So that every merge to `main` **auto-deploys** to your live site:

| Platform | How |
|---|---|
| **Vercel** | Import repo → auto-deploys on every push to main |
| **Netlify** | Import repo → auto-deploys on every push to main |
| **Render** | Connect repo → auto-deploys on every push to main |

---

## The full automatic flow after setup:
```
You give Codex a task
        ↓
Codex edits your code
        ↓
Codex pushes to a branch
        ↓
Codex opens a Pull Request
        ↓
GitHub Actions auto-merges it
        ↓
Your hosting platform auto-deploys
        ↓
Live on your website ✅